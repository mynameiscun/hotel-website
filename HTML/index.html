<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/style.css">
    <title>Hotel_Booking</title>
</head>
<body>
<!-- HEADER -->
<header>
    <div class="topbar">
        <div class="language">
            EN | VI
        </div>
        <div class="logo">
            <img src="../IMAGE/logo.png" alt="Hotel Logo">
        </div>
        <!-- Contact -->
    <ul class="contact">
        <li><a href="#"><img src="../IMAGE/facebook.png" alt="Facebook"></a></li>
        <li><a href="#"><img src="../IMAGE/instagram.png" alt="Instagram"></a></li>
        <li><a href="#"><img src="../IMAGE/youtube.png" alt="Youtube"></a></li>
    </ul>
    </div>
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="rooms.html">Rooms</a>
        <a href="facilities.html">Facilities</a>
        <a href="news.html">News</a>
        <a href="contact.html">Contact</a>
    </nav>

</header>

<!-- HERO SECTION -->
<section class="hero">
    <div class="hero-text">
        <h1>Welcome to Our Hotel</h1>
        <p>Enjoy your trip with us!</p>
    </div>
</section>
<div class="booking-box">
<h2>Search Your Stay</h2>
<form action="rooms.html" method="get" class="booking-form">
    <input type="date" name="checkin" required>
    <input type="date" name="checkout" required>
    <select name="guests">
        <option value="">Guests</option>
        <option value="1">1 Guest</option>
        <option value="2">2 Guests</option>
        <option value="3">3 Guests</option>
        <option value="4">4 Guests</option>
    </select>
    <select name="room">
        <option value="">Room Type</option>
        <option value="single">Single Room</option>
        <option value="double">Double Room</option>
        <option value="suite">Suite</option>
    </select>
    <button type="submit">Search</button>
</form>
</div>
<!-- ROOMS SECTION -->
<section class="rooms">
    <h2>Our Rooms</h2>
</section>


<!-- FACILITIES SECTION -->
<section class="facilities">
    <h2>Facilities</h2>
</section>


<!-- NEWS SECTION -->
<section class="news">
    <h2>Latest News</h2>
</section>


<!-- FOOTER -->
<footer>
    <p>© 2026 Hotel Website</p>
</footer>
</body>
</html>
