<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    
    <style>
        .auth-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 80vh;
  background: url('hotel-bg.jpg') center/cover no-repeat;
}

.auth-card {
  background: rgba(255,255,255,0.95);
  padding: 30px;
  border-radius: 8px;
  width: 350px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.auth-card h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

.input-group {
  margin-bottom: 15px;
}

.input-group label {
  display: block;
  font-weight: bold;
  margin-bottom: 5px;
}

.input-group input {
  width: 100%;
  padding: 10px;
  border: 1px solid #aaa;
  border-radius: 5px;
}

.btn-auth {
  width: 100%;
  padding: 12px;
  background: #b89b5e; /* màu vàng sang trọng */
  color: #fff;
  border: none;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
}

.btn-auth:hover {
  background: #a07f3f;
}

.switch-auth {
  text-align: center;
  margin-top: 15px;
}

    </style>
</head>
<body>
    <!-- LOGIN PAGE -->
<section class="auth-container">
  <div class="auth-card">
    <h2>Login</h2>
    <form id="login-form">
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter your username" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn-auth">Login</button>
      <p class="switch-auth">Don't have an account? <a href="signup.html">Sign up</a></p>
    </form>
  </div>
</section>
<script src="../JS/jquery-4.0.0.min.js"></script>
<script>
$(document).ready(function(){

$("#login-form").submit(function(e){

e.preventDefault();

let username = $("#login-username").val().trim();
let password = $("#login-password").val().trim();

// lấy user
let users = JSON.parse(localStorage.getItem("users")) || [];

// tìm user
let user = users.find(u => 
u.username === username && 
u.password === password
);

if(!user){

$("#errorModal").css("display","flex").hide().fadeIn();

return;
}

// lưu user login
localStorage.setItem("loggedInUser", username);

// hiện modal
$("#loginModal").css("display","flex").hide().fadeIn();

});


// nút về home
$("#goHome").click(function(){

window.location.href="index.html";

});


// nút X đóng modal
$(".close-modal").click(function(){

$("#loginModal").fadeOut();

});


// click ngoài modal
$(window).click(function(e){

if($(e.target).is("#loginModal")){
$("#loginModal").fadeOut();
}

});
$("#closeError,.close-error").click(function(){
$("#errorModal").fadeOut();
});
});

</script>

<!-- LOGIN SUCCESS MODAL -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    
    <span class="close-modal">&times;</span>

    <h3>Đăng nhập thành công</h3>
    <p>Chuyển về trang chủ</p>

    <button id="goHome">Về trang chủ</button>

  </div>
</div>
<!-- LOGIN ERROR MODAL -->
<div id="errorModal" class="modal">
  <div class="modal-content">
    
    <span class="close-error">&times;</span>

    <h3 style="color:red;">Đăng nhập thất bại</h3>
    <p>Sai username hoặc password</p>

    <button id="closeError">OK</button>

  </div>
</div>
<style>
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);

justify-content:center;
align-items:center;

z-index:9999;
}

.modal-content{
background:white;
padding:25px;
border-radius:8px;
text-align:center;
width:350px;
position:relative;
}

.close-modal{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
font-weight:bold;
}

.modal-content button{
margin-top:15px;
padding:10px 20px;
background:#b89b5e;
color:white;
border:none;
cursor:pointer;
}
.close-error{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
font-weight:bold;
}
</style>
</body>
</html>
