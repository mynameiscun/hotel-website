<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <style>
        .auth-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 80vh;
  background: url('hotel-bg.jpg') center/cover no-repeat;
}

.auth-card {
  background: rgba(255,255,255,0.95);
  padding: 30px;
  border-radius: 8px;
  width: 350px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.auth-card h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

.input-group {
  margin-bottom: 15px;
}

.input-group label {
  display: block;
  font-weight: bold;
  margin-bottom: 5px;
}

.input-group input {
  width: 100%;
  padding: 10px;
  border: 1px solid #aaa;
  border-radius: 5px;
}

.btn-auth {
  width: 100%;
  padding: 12px;
  background: #b89b5e; /* màu vàng sang trọng */
  color: #fff;
  border: none;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
}

.btn-auth:hover {
  background: #a07f3f;
}

.switch-auth {
  text-align: center;
  margin-top: 15px;
}

    </style>
</head>
<body>
    <!-- LOGIN PAGE -->
<section class="auth-container">
  <div class="auth-card">
    <h2>Login</h2>
    <form id="login-form">
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter your username" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn-auth">Login</button>
      <p class="switch-auth">Don't have an account? <a href="signup.html">Sign up</a></p>
    </form>
  </div>
</section>
<script>
  // LOGIN
document.getElementById("login-form").addEventListener("submit", function(e){
  e.preventDefault();

  const user = document.getElementById("login-username").value;
  const pass = document.getElementById("login-password").value;

  const savedUser = JSON.parse(localStorage.getItem("user"));

  if(savedUser && savedUser.username === user && savedUser.password === pass){

    localStorage.setItem("loggedInUser", user);

    alert("Login thành công!");
    window.location.href = "room-detail.html";

  } else {
    alert("Sai tài khoản hoặc mật khẩu!");
  }
});
</script>
</body>
</html>
