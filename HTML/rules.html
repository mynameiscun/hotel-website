<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/bootstrap.min.css">
    <link rel="stylesheet" href="../CSS/rules.css">
    <title>Document</title>
</head>
<body>
        <!-- HEADER -->
    <div class="header">
        <div class="logo">
            <a href="index.html"><img src="../IMAGE/logo.png" alt="Hotel Logo"></a>
        </div>
        <div class="navbar">
            <a href="../HTML/index.html">Trang chủ</a>
            <a href="#about">Về chúng tôi</a>
            <a href="#rooms">Hệ thống phòng</a>
            <a href="#facilities">Dịch vụ & tiện ích</a>
            <a href="#news">Tin tức</a>
            <a href="#contact">Kết nối</a>
        </div>
        <div class="right">
            <div class="login" id="auth-area">
                <a href="login.html">Đăng nhập</a>
                <a href="signup.html">Tạo tài khoản</a>
            </div>
            <ul class="contact">
                <li><a href="#"><img src="../IMAGE/facebook.png" alt="Facebook"></a></li>
                <li><a href="#"><img src="../IMAGE/instagram.png" alt="Instagram"></a></li>
            </ul>
        </div>
    </div>
    <!-- HERO SECTION -->
    <section class="hero" id="home">
        <div class="hero-text">
            <h1>Không gian nghỉ dưỡng đẳng cấp</h1>
            <p>Nâng tầm hành trình của bạn cùng chúng tôi</p>
        </div>
    </section>
    <div class="box-wrapper">
        <div class="booking-box">
            <h2>Khám phá kỳ nghỉ</h2>
            <form action="rooms.html" method="get" class="booking-form">
                <input type="date" name="checkin" required>
                <input type="date" name="checkout" required>
                <select name="guests">
                    <option value="">Số khách</option>
                    <option value="1">1 người</option>
                    <option value="2">2 người</option>
                    <option value="3">3 người</option>
                    <option value="4">4 người</option>
                </select>
                <select name="room">
                    <option value="">Loại phòng</option>
                    <option value="single">Royal Suite</option>
                    <option value="double">Executive Suite</option>
                    <option value="suite">Deluxe Twin</option>
                </select>
                <button type="submit">Tìm phòng</button>
            </form>
        </div>
    </div>
</body>
</html>
