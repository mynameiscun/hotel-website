<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGN UP</title>
    
    <style>
        .auth-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 80vh;
  background: url('hotel-bg.jpg') center/cover no-repeat;
}

.auth-card {
  background: rgba(255,255,255,0.95);
  padding: 30px;
  border-radius: 8px;
  width: 350px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.auth-card h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

.input-group {
  margin-bottom: 15px;
}

.input-group label {
  display: block;
  font-weight: bold;
  margin-bottom: 5px;
}

.input-group input {
  width: 100%;
  padding: 10px;
  border: 1px solid #aaa;
  border-radius: 5px;
}

.btn-auth {
  width: 100%;
  padding: 12px;
  background: #b89b5e; /* màu vàng sang trọng */
  color: #fff;
  border: none;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
}

.btn-auth:hover {
  background: #a07f3f;
}

.switch-auth {
  text-align: center;
  margin-top: 15px;
}

    </style>
</head>
<body>
    <!-- SIGN UP PAGE -->
<section class="auth-container">
  <div class="auth-card">
    <h2>Sign Up</h2>
    <form id="signup-form">
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Your full name" required>
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="Your email" required>
      </div>
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="signup-username" placeholder="Choose a username" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Choose a password" required>
      </div>
      <button type="submit" class="btn-auth">Sign Up</button>
      <p class="switch-auth">Already have an account? <a href="login.html">Login</a></p>
    </form>
  </div>
</section>
<script src="../JS/jquery-4.0.0.min.js"></script>
<script>
 
$(document).ready(function(){

$("#signup-form").submit(function(e){

e.preventDefault();

let name = $("#signup-name").val().trim();
let email = $("#signup-email").val().trim();
let username = $("#signup-username").val().trim();
let password = $("#signup-password").val().trim();


// lấy users
let users = JSON.parse(localStorage.getItem("users")) || [];

// check username trùng
let exist = users.find(user => user.username === username);

if(exist){
alert("Username đã tồn tại");
return;
}


// tạo user
let newUser = {
name:name,
email:email,
username:username,
password:password
};

// push user
users.push(newUser);

// save
localStorage.setItem("users", JSON.stringify(users));


// HIỂN THỊ MODAL SAU KHI SUCCESS
$("#signupModal").css("display","flex").hide().fadeIn();

});


// nút login
$("#goLogin").click(function(){

window.location.href="login.html";

});


// nút X đóng modal
$(".close-modal").click(function(){

$("#signupModal").fadeOut();

});


// click ngoài modal đóng
$(window).click(function(e){

if($(e.target).is("#signupModal")){
$("#signupModal").fadeOut();
}

});

});

</script>
<!-- SUCCESS MODAL -->
<div id="signupModal" class="modal">
  <div class="modal-content">
    
    <span class="close-modal">&times;</span>
    
    <h3>Đăng ký thành công</h3>
    <p>Tài khoản đã được tạo</p>
    
    <button id="goLogin">Đăng nhập ngay</button>

  </div>
</div>

<style>
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);

justify-content:center;
align-items:center;

z-index:9999;
}

.modal-content{
background:white;
padding:25px;
border-radius:8px;
text-align:center;
width:350px;
position:relative;
}

.close-modal{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
font-weight:bold;
}

.modal-content button{
margin-top:15px;
padding:10px 20px;
background:#b89b5e;
border:none;
color:white;
cursor:pointer;
}
</style>
</body>
</html>
