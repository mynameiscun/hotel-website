<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGN UP</title>
    <style>
        .auth-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 80vh;
  background: url('hotel-bg.jpg') center/cover no-repeat;
}

.auth-card {
  background: rgba(255,255,255,0.95);
  padding: 30px;
  border-radius: 8px;
  width: 350px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.auth-card h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

.input-group {
  margin-bottom: 15px;
}

.input-group label {
  display: block;
  font-weight: bold;
  margin-bottom: 5px;
}

.input-group input {
  width: 100%;
  padding: 10px;
  border: 1px solid #aaa;
  border-radius: 5px;
}

.btn-auth {
  width: 100%;
  padding: 12px;
  background: #b89b5e; /* màu vàng sang trọng */
  color: #fff;
  border: none;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
}

.btn-auth:hover {
  background: #a07f3f;
}

.switch-auth {
  text-align: center;
  margin-top: 15px;
}

    </style>
</head>
<body>
    <!-- SIGN UP PAGE -->
<section class="auth-container">
  <div class="auth-card">
    <h2>Sign Up</h2>
    <form id="signup-form">
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Your full name" required>
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="Your email" required>
      </div>
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="signup-username" placeholder="Choose a username" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Choose a password" required>
      </div>
      <button type="submit" class="btn-auth" onclick="localStorage.clear()">Sign Up</button>
      <p class="switch-auth">Already have an account? <a href="login.html">Login</a></p>
    </form>
  </div>
</section>
<script>
  // SIGN UP
document.getElementById("signup-form")?.addEventListener("submit", function(e){
  e.preventDefault();
  const newUser = {
    name: document.getElementById("signup-name").value,
    email: document.getElementById("signup-email").value,
    username: document.getElementById("signup-username").value,
    password: document.getElementById("signup-password").value
  };
  localStorage.setItem("user", JSON.stringify(newUser));
  alert("Đăng ký thành công! Vui lòng đăng nhập.");
  window.location.href = "login.html";
});
if(!sessionStorage.getItem("demoStarted")){
    localStorage.clear();
    sessionStorage.setItem("demoStarted", "true");
    }
</script>
</body>
</html>
