<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../JS/jquery-4.0.0.min.js"></script>
    <link rel="stylesheet" href="../CSS/signup.css">
    <title>Đăng ký tài khoản</title>
</head>
<body>
    <!-- SIGN UP PAGE -->
<section class="auth-container">
  <div class="auth-card">
    <h2>Đăng ký</h2>
    <form id="signup-form">
      <div class="input-group">
        <label>Họ Tên</label>
        <input type="text" id="signup-name" placeholder="Your full name" required>
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="Your email" required>
      </div>
      <div class="input-group">
        <label>Tên đăng nhập</label>
        <input type="text" id="signup-username" placeholder="Choose a username" required>
      </div>
      <div class="input-group">
        <label>Mật khẩu</label>
        <input type="password" id="signup-password" placeholder="Choose a password" required>
      </div>
      <button type="submit" class="btn-auth">Đăng ký</button>
      <p class="switch-auth">Bạn đã có tài khoản?<a href="login.html"> Đăng nhập ngay</a></p>
    </form>
  </div>
</section>


<!-- SUCCESS MODAL -->
<div id="signupModal" class="modal">
  <div class="modal-content">
    
    <span class="close-modal">&times;</span>
    
    <h3>Đăng ký thành công</h3>
    <p>Tài khoản đã được tạo</p>
    
    <button id="goLogin">Đăng nhập ngay</button>

  </div>
</div>
<script src="../JS/signup.js"></script>


</body>
</html>
