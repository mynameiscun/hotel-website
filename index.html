<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FIX PATH -->
    <link rel="stylesheet" href="CSS/bootstrap.min.css">
    <link rel="stylesheet" href="CSS/style.css">

    <title>Hotel_Booking</title>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">
        <a href="index.html"><img src="IMAGE/logo.png"></a>
    </div>

    <div class="navbar">
        <a href="#home">Home</a>
        <a href="#about">About Us</a>
        <a href="#rooms">Rooms</a>
        <a href="#facilities">Facilities</a>
        <a href="#news">News</a>
        <a href="#contact">Contact</a>
    </div>

    <div class="right">
        <div class="login">
            <a href="login.html">Login</a>
            <a href="signup.html">Sign up</a>
        </div>

        <ul class="contact">
            <li><img src="IMAGE/facebook.png"></li>
            <li><img src="IMAGE/instagram.png"></li>
        </ul>
    </div>
</div>

<!-- HERO -->
<section class="hero" id="home">
    <div class="hero-text">
        <h1>Welcome to Our Hotel</h1>
        <p>Enjoy your trip with us!</p>
    </div>
</section>

<!-- BOOKING -->
<div class="box-wrapper">
    <div class="booking-box">
        <h2>Search Your Stay</h2>

        <form action="rooms.html">
            <input type="date" onblur="validateDate(this)" required>
            <input type="date" onblur="validateDate(this)" required>

            <select onblur="validateSelect(this)">
                <option value="">Guests</option>
                <option>1 Guest</option>
                <option>2 Guests</option>
            </select>

            <select onblur="validateSelect(this)">
                <option value="">Room Type</option>
                <option>Single</option>
                <option>Double</option>
            </select>

            <button>Search</button>
        </form>
    </div>
</div>

<!-- JS -->
<script src="JS/bootstrap.bundle.min.js"></script>

<script>
function validateDate(input){
    if(input.value === ""){
        input.style.border = "2px solid red";
    } else {
        input.style.border = "1px solid #ccc";
    }
}

function validateSelect(select){
    if(select.value === ""){
        select.style.border = "2px solid red";
    } else {
        select.style.border = "1px solid #ccc";
    }
}

// FIX MODAL JS IMAGE PATH
const facilityData = {
    restaurant: {
        title: "Restaurant",
        details: [
            { img: "IMAGE/restaurant1.png", desc: "Nice restaurant" },
            { img: "IMAGE/restaurant2.png", desc: "Luxury space" },
            { img: "IMAGE/restaurant3.png", desc: "Romantic night" }
        ]
    }
};

let currentType = "restaurant";
let currentIndex = 0;

function openFacilities(type){
    document.getElementById("facilityModal").style.display="flex";
    currentType = type;
    currentIndex = 0;
    renderFacility();
}

function renderFacility(){
    let data = facilityData[currentType];
    let item = data.details[currentIndex];

    document.getElementById("facilityMainImg").src = item.img;
    document.getElementById("facilityTitle").innerText = data.title;
    document.getElementById("facilityText").innerText = item.desc;
}

function closeFacilities(){
    document.getElementById("facilityModal").style.display="none";
}
</script>

</body>
</html>
